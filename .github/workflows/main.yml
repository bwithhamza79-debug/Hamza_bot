name: Viral Shorts Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install edge-tts g4f requests google-api-python-client google-auth
      - name: Run bot
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python - <<'EOF'
          import os, tempfile, subprocess, random, asyncio, edge_tts, g4f, requests, math
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          REFRESH_TOKEN = os.environ["YOUTUBE_REFRESH_TOKEN"]
          CLIENT_ID = os.environ["GOOGLE_CLIENT_ID"]
          CLIENT_SECRET = os.environ["GOOGLE_CLIENT_SECRET"]

          # 1. Get trending topic from AI (fallback list if needed)
          print("Fetching trending topic...")
          fallback_topics = [
              "iPhone 17 leaked features",
              "TikTok ban update today",
              "Morning routine of millionaires",
              "One‑minute trick saves your phone battery",
              "AI robot replaces human workers",
              "Secret airplane hack flight attendants hate",
              "Food combination that melts belly fat",
              "World's most dangerous road",
              "Why everyone is quitting 9‑to‑5 jobs",
              "Government declassified UFO footage"
          ]
          try:
              trend_response = g4f.ChatCompletion.create(
                  model=g4f.models.gpt_4,
                  messages=[{"role": "user", "content": "Give me one trending topic today for a viral YouTube Short. Only the topic text, nothing else."}]
              )
              topic = trend_response.strip()
              if len(topic) < 5:
                  raise ValueError("Too short")
          except:
              topic = random.choice(fallback_topics)
          print(f"Topic: {topic}")

          # 2. Build viral narration using a template (no AI script)
          print("Building narration from template...")
          hook = f"Did you know about {topic}? This is blowing up the internet right now."
          body = f"People can't stop talking about it. Experts are shocked by what they discovered. The truth behind this will change everything you thought you knew."
          cta = "Like and subscribe for more trending updates!"
          narration = f"{hook} {body} {cta}"
          # Trim to 150 words max if needed
          words = narration.split()
          if len(words) > 150:
              narration = ' '.join(words[:150])
          print(f"Narration: {narration[:120]}...")

          # 3. Generate 5 AI images directly from topic (no scene descriptions)
          print("Generating images...")
          image_prompts = [
              f"Trending topic {topic}, dramatic reveal",
              f"{topic}, close‑up, intense lighting",
              f"People reacting to {topic}, viral moment",
              f"Breaking news about {topic}, bold headline",
              f"{topic}, futuristic look, final shot"
          ]
          image_paths = []
          for prompt in image_prompts:
              url = f"https://image.pollinations.ai/prompt/{requests.utils.quote(prompt)}?width=576&height=1024&nologo=true"
              r = requests.get(url)
              tmp = tempfile.NamedTemporaryFile(suffix='.jpg', delete=False)
              tmp.write(r.content)
              tmp.close()
              image_paths.append(tmp.name)

          # 4. Voiceover (Jenny, reliable and clean)
          print("Generating voiceover...")
          audio_file = tempfile.NamedTemporaryFile(suffix='.mp3', delete=False)
          subs_file = tempfile.NamedTemporaryFile(suffix='.srt', delete=False)
          async def tts():
              communicate = edge_tts.Communicate(narration, "en-US-JennyNeural")
              submaker = edge_tts.SubMaker()
              with open(audio_file.name, 'wb') as f:
                  async for chunk in communicate.stream():
                      if chunk["type"] == "audio":
                          f.write(chunk["data"])
                      elif chunk["type"] == "WordBoundary":
                          submaker.feed(chunk)
              with open(subs_file.name, 'w') as f:
                  f.write(submaker.get_srt())
          asyncio.run(tts())

          # 5. Audio duration & trim to ≤60s
          result = subprocess.run(['ffprobe', '-v', 'error', '-show_entries',
                                   'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1',
                                   audio_file.name], stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
          dur = float(result.stdout)
          if dur > 60:
              trimmed_audio = tempfile.NamedTemporaryFile(suffix='.mp3', delete=False)
              subprocess.run(['ffmpeg', '-y', '-i', audio_file.name, '-t', '60', '-c:a', 'aac', trimmed_audio.name], check=True)
              audio_file = trimmed_audio
              dur = 60.0

          # 6. Build clean captions directly from narration (no SRT reliance)
          print("Generating captions...")
          words = narration.split()
          chunk_size = max(1, len(words) // math.ceil(dur)) if dur > 0 else 4
          srt_entries = []
          start = 0.0
          for i in range(0, len(words), chunk_size):
              segment = ' '.join(words[i:i+chunk_size])
              end = min(start + 2.5, dur)
              ms_start = int((start % 1) * 1000)
              s_start = int(start % 60)
              m_start = int((start // 60) % 60)
              h_start = int(start // 3600)
              ms_end = int((end % 1) * 1000)
              s_end = int(end % 60)
              m_end = int((end // 60) % 60)
              h_end = int(end // 3600)
              start_str = f"{h_start:02d}:{m_start:02d}:{s_start:02d},{ms_start:03d}"
              end_str = f"{h_end:02d}:{m_end:02d}:{s_end:02d},{ms_end:03d}"
              srt_entries.append(f"{len(srt_entries)+1}\n{start_str} --> {end_str}\n{segment}")
              start = end
          with open(subs_file.name, 'w') as f:
              f.write('\n\n'.join(srt_entries) + '\n\n')

          # 7. Silent slideshow (match audio length)
          print("Making video...")
          n = len(image_paths)
          dur_each = dur / n
          inputs = []
          filter_parts = []
          for i, img in enumerate(image_paths):
              inputs += ['-loop', '1', '-t', str(dur_each), '-i', img]
              filter_parts.append(f'[{i}:v]')
          silent = '/tmp/silent.mp4'
          concat = f"{' '.join(filter_parts)}concat=n={n}:v=1:a=0,format=yuv420p"
          subprocess.run(['ffmpeg', '-y'] + inputs + ['-filter_complex', concat, '-c:v', 'libx264', '-preset', 'ultrafast', silent], check=True)

          # 8. Burn captions + audio
          final = '/tmp/final.mp4'
          subprocess.run(['ffmpeg', '-y', '-i', silent, '-i', audio_file.name,
                          '-vf', f"subtitles={subs_file.name}:force_style='Fontsize=18,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=3'",
                          '-c:v', 'libx264', '-c:a', 'aac', '-shortest', final], check=True)

          # 9. SEO title, description, tags (also template‑based)
          title = f"{topic} – You Won't Believe This! 😱"
          desc = f"Trending right now: {topic}. The truth will shock you. Watch this viral short to see what everyone's talking about. #viral #trending #shorts"
          tags = [topic] + ["viral", "trending", "breaking", "shorts", "youtube shorts", "trending topic", "viral short", "new trend", "whats trending"]

          # 10. Upload to YouTube
          print("Uploading to YouTube...")
          creds = Credentials.from_authorized_user_info({
              'refresh_token': REFRESH_TOKEN,
              'client_id': CLIENT_ID,
              'client_secret': CLIENT_SECRET
          })
          youtube = build('youtube', 'v3', credentials=creds)
          body = {
              'snippet': {
                  'title': title,
                  'description': desc,
                  'tags': tags,
                  'categoryId': '22'
              },
              'status': {'privacyStatus': 'public'}
          }
          media = MediaFileUpload(final, chunksize=-1, resumable=True)
          youtube.videos().insert(part='snippet,status', body=body, media_body=media).execute()
          print("Upload complete! Check your channel.")
          EOF
