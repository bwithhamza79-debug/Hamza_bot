name: Viral Shorts Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install edge-tts g4f requests pytrends google-api-python-client google-auth
      - name: Run bot
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          python - <<'EOF'
          import os, tempfile, subprocess, json, random, asyncio, edge_tts, g4f, requests, re, math
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          REFRESH_TOKEN = os.environ["YOUTUBE_REFRESH_TOKEN"]
          CLIENT_ID = os.environ["GOOGLE_CLIENT_ID"]
          CLIENT_SECRET = os.environ["GOOGLE_CLIENT_SECRET"]

          # 1. Dynamic trending topic
          print("Fetching trending topic...")
          trend_prompt = "Give me a single trending topic right now that would make a viral YouTube Short. Reply with only the topic text, no extra words."
          try:
              trend_response = g4f.ChatCompletion.create(
                  model=g4f.models.gpt_4,
                  messages=[{"role": "user", "content": trend_prompt}]
              )
              topic = trend_response.strip()
              if len(topic) < 3:
                  raise ValueError("Short topic")
          except:
              topic = random.choice([
                  "iPhone 17 leaked features shock everyone",
                  "TikTok ban update that changes everything",
                  "Morning routine of millionaires exposed",
                  "This 1-minute trick saves your phone battery",
                  "AI robot replaces human workers overnight",
                  "Secret airplane hack flight attendants hate",
                  "Food combination that melts belly fat",
                  "World's most dangerous road revealed",
                  "Why everyone is quitting their 9-5 jobs",
                  "Government declassified UFO footage"
              ])
          print(f"Topic: {topic}")

          # 2. Script with separate NARRATION and SCENES
          print("Generating script and scenes...")
          prompt = f"""Create a viral 60-second YouTube Short about '{topic}'.
          You must provide TWO clearly labelled sections:
          1. NARRATION: (the spoken voiceover, conversational, max 150 words, start with a hook, end with a call to action)
          2. SCENES: (exactly 5 short visual descriptions of what should be shown on screen, each on a new line, like "Aerial view of Death Road")
          After that, provide the metadata:
          TITLE: [SEO title, max 100 chars]
          DESCRIPTION: [description with 3 hashtags]
          TAGS: [10 comma-separated tags]
          
          Example:
          NARRATION:
          Did you know there's a road where 300 people die every year? Bolivia's Death Road was built by prisoners with no guardrails and cliffs over 600 meters deep. Today, thrill‑seekers still bike down it for the ultimate adrenaline rush. Would you dare? Subscribe for more crazy facts!
          SCENES:
          Drone shot of narrow cliffside road
          Close-up of crumbling edge with deep drop
          Bikers cycling past warning signs
          POV handlebar view speeding down the road
          Final shot of biker silhouetted against sunset
          TITLE: Bolivia's Death Road Will Shock You
          DESCRIPTION: The world's most dangerous road claims lives every year. Would you ride it? #dangerousroads #bolivia #extremetravel
          TAGS: death road,most dangerous road,bolivia,yungas road,adrenaline,extreme travel,cliffside,thrill seeker,viral fact,scary places
          
          IMPORTANT: No markdown, no code blocks, no links. Use plain text only."""
          try:
              response = g4f.ChatCompletion.create(
                  model=g4f.models.gpt_4,
                  messages=[{"role": "user", "content": prompt}]
              )
          except:
              response = ""
          # Clean any stray markdown
          cleaned = re.sub(r'```.*?```', '', response, flags=re.DOTALL)
          cleaned = re.sub(r'`[^`]*`', '', cleaned)
          cleaned = re.sub(r'http\S+', '', cleaned)
          cleaned = re.sub(r'\[.*?\]\(.*?\)', '', cleaned)
          cleaned = re.sub(r'<[^>]+>', '', cleaned)
          cleaned = cleaned.strip()

          # Parse NARRATION and SCENES
          narration = ""
          scenes = []
          if "NARRATION:" in cleaned.upper():
              # Split on NARRATION: and SCENES:
              parts_narration = re.split(r'(?i)NARRATION:', cleaned, maxsplit=1)
              if len(parts_narration) > 1:
                  rest = parts_narration[1]
                  if "SCENES:" in rest.upper():
                      parts_scenes = re.split(r'(?i)SCENES:', rest, maxsplit=1)
                      narration = parts_scenes[0].strip()
                      scenes_raw = parts_scenes[1] if len(parts_scenes) > 1 else ""
                      # Extract scenes lines before TITLE: or end
                      if "TITLE:" in scenes_raw.upper():
                          scenes_raw = scenes_raw.split("TITLE:")[0].strip()
                      scenes = [line.strip() for line in scenes_raw.split('\n') if line.strip()][:5]
                  else:
                      narration = rest.split("TITLE:")[0].strip() if "TITLE:" in rest.upper() else rest.strip()
          else:
              # Fallback: whole response is narration
              narration = cleaned.split("TITLE:")[0].strip() if "TITLE:" in cleaned.upper() else cleaned

          # Ensure narration is usable
          narration = re.sub(r'^(SCRIPT:|NARRATION:|Here is.*?)\s*', '', narration, flags=re.IGNORECASE).strip()
          if len(narration.split()) < 20:
              narration = f"Did you know about {topic}? This trending topic is taking over social media right now. Experts are shocked by what they discovered. The truth will surprise you. Stay tuned for the full breakdown. Like and subscribe for more!"
          print(f"Narration: {narration[:150]}...")

          # If no scenes, generate from narration sentences
          if len(scenes) < 2:
              sentences = [s.strip() for s in narration.split('.') if s.strip()][:5]
              scenes = [f"Visual representation of: {s}" for s in sentences]
          print(f"Scenes: {scenes}")

          # Metadata parsing
          if "TITLE:" in cleaned.upper():
              meta_split = re.split(r'(?i)TITLE:', cleaned, maxsplit=1)[1] if re.split(r'(?i)TITLE:', cleaned, maxsplit=1)[1] else ""
              meta_parts = re.split(r'(?i)DESCRIPTION:', meta_split, maxsplit=1)
              title = meta_parts[0].strip()[:100] if meta_parts[0] else f"{topic[:95]}..."
              if len(meta_parts) > 1:
                  desc_part = re.split(r'(?i)TAGS:', meta_parts[1], maxsplit=1)
                  desc = desc_part[0].strip()
                  tags = [t.strip() for t in desc_part[1].split(",")][:10] if len(desc_part) > 1 else ["viral", "trending"]
              else:
                  desc = f"Viral short about {topic}. #viral #trending #shorts"
                  tags = ["viral", "trending", "shorts"]
          else:
              title = f"{topic[:95]}..."
              desc = f"Viral short about {topic}. #viral #trending #shorts"
              tags = ["viral", "trending", "shorts"]
          print(f"Title: {title}")

          # 3. Generate images from scenes
          print("Generating images...")
          image_paths = []
          for scene in scenes:
              prompt_img = f"realistic cinematic 9:16 vertical shot, {scene}"
              url = f"https://image.pollinations.ai/prompt/{requests.utils.quote(prompt_img)}?width=576&height=1024&nologo=true"
              r = requests.get(url)
              tmp = tempfile.NamedTemporaryFile(suffix='.jpg', delete=False)
              tmp.write(r.content)
              tmp.close()
              image_paths.append(tmp.name)

          # 4. TTS with natural voice (Aria > Jenny)
          print("Generating voiceover...")
          audio_file = tempfile.NamedTemporaryFile(suffix='.mp3', delete=False)
          subs_file = tempfile.NamedTemporaryFile(suffix='.srt', delete=False)
          async def tts():
              for voice in ["en-US-AriaNeural", "en-US-JennyNeural"]:
                  try:
                      communicate = edge_tts.Communicate(narration, voice, rate="+10%")
                      submaker = edge_tts.SubMaker()
                      with open(audio_file.name, 'wb') as f:
                          async for chunk in communicate.stream():
                              if chunk["type"] == "audio":
                                  f.write(chunk["data"])
                              elif chunk["type"] == "WordBoundary":
                                  submaker.feed(chunk)
                      with open(subs_file.name, 'w') as f:
                          f.write(submaker.get_srt())
                      return
                  except:
                      continue
              # Final fallback
              communicate = edge_tts.Communicate(narration, "en-US-JennyNeural")
              submaker = edge_tts.SubMaker()
              with open(audio_file.name, 'wb') as f:
                  async for chunk in communicate.stream():
                      if chunk["type"] == "audio":
                          f.write(chunk["data"])
                      elif chunk["type"] == "WordBoundary":
                          submaker.feed(chunk)
              with open(subs_file.name, 'w') as f:
                  f.write(submaker.get_srt())
          asyncio.run(tts())

          # 5. Audio duration & trim to ≤60s
          result = subprocess.run(['ffprobe', '-v', 'error', '-show_entries',
                                   'format=duration', '-of', 'default=noprint_wrappers=1:nokey=1',
                                   audio_file.name], stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
          dur = float(result.stdout)
          if dur > 60:
              print(f"Audio too long ({dur:.1f}s), trimming to 60s...")
              trimmed_audio = tempfile.NamedTemporaryFile(suffix='.mp3', delete=False)
              subprocess.run(['ffmpeg', '-y', '-i', audio_file.name, '-t', '60', '-c:a', 'aac', trimmed_audio.name], check=True)
              audio_file = trimmed_audio
              dur = 60.0
          print(f"Audio duration: {dur:.1f}s")

          # 6. Subtitles fallback
          def time_to_seconds(t):
              h, m, s = t.replace(',','.').split(':')
              return int(h)*3600 + int(m)*60 + float(s)
          if os.path.getsize(subs_file.name) == 0:
              print("No word-level subtitles, creating full SRT.")
              with open(subs_file.name, 'w') as f:
                  f.write("1\n00:00:00,000 --> 00:00:59,000\n" + narration + "\n\n")
          else:
              with open(subs_file.name, 'r') as f:
                  srt_content = f.read()
              new_srt = []
              for block in srt_content.strip().split('\n\n'):
                  lines = block.split('\n')
                  if len(lines) >= 2:
                      start_time = lines[1].split(' --> ')[0]
                      if time_to_seconds(start_time) < 60:
                          new_srt.append(block)
              with open(subs_file.name, 'w') as f:
                  f.write('\n\n'.join(new_srt) + '\n\n')

          # 7. Silent slideshow (match audio length)
          print("Making video...")
          n = len(image_paths)
          dur_each = dur / n
          inputs = []
          filter_parts = []
          for i, img in enumerate(image_paths):
              inputs += ['-loop', '1', '-t', str(dur_each), '-i', img]
              filter_parts.append(f'[{i}:v]')
          silent = '/tmp/silent.mp4'
          concat = f"{' '.join(filter_parts)}concat=n={n}:v=1:a=0,format=yuv420p"
          subprocess.run(['ffmpeg', '-y'] + inputs + ['-filter_complex', concat, '-c:v', 'libx264', '-preset', 'ultrafast', silent], check=True)

          # 8. Burn captions + audio
          final = '/tmp/final.mp4'
          subprocess.run(['ffmpeg', '-y', '-i', silent, '-i', audio_file.name,
                          '-vf', f"subtitles={subs_file.name}:force_style='Fontsize=18,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,BorderStyle=3'",
                          '-c:v', 'libx264', '-c:a', 'aac', '-shortest', final], check=True)

          # 9. Upload to YouTube
          print("Uploading to YouTube...")
          creds = Credentials.from_authorized_user_info({
              'refresh_token': REFRESH_TOKEN,
              'client_id': CLIENT_ID,
              'client_secret': CLIENT_SECRET
          })
          youtube = build('youtube', 'v3', credentials=creds)
          body = {
              'snippet': {
                  'title': title,
                  'description': desc,
                  'tags': tags,
                  'categoryId': '22'
              },
              'status': {'privacyStatus': 'public'}
          }
          media = MediaFileUpload(final, chunksize=-1, resumable=True)
          youtube.videos().insert(part='snippet,status', body=body, media_body=media).execute()
          print("Upload complete! Check your channel.")
          EOF
